version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: fullstack-db
    restart: always
    environment:
      POSTGRES_DB: beneficios
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: fullstack-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

  wildfly:
    build:
      context: .
      dockerfile: Dockerfile.wildfly
    container_name: fullstack-wildfly
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
      - "9990:9990"

volumes:
  postgres_data: