name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install EJB module
        run: mvn -B -f ejb-module/pom.xml clean install -DskipTests

      - name: Run backend tests
        run: mvn -B -f backend-module/pom.xml test

      - name: Build backend
        run: mvn -B -f backend-module/pom.xml clean package -DskipTests